name: Project Check

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          pip install pandas numpy matplotlib jupyter

      - name: Execute notebook
        run: |
          jupyter nbconvert --to notebook --execute "Apple_analysis_worldpopulation-_Notebook.ipynb" --output executed.ipynb
